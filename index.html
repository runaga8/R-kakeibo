<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-KAKEIBO</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        :root { 
            --primary: #5c6bc0; 
            --primary-hover: #4338ca;
            --danger: #ef5350; 
            --edit: #ffca28; 
            --success: #4caf50; 
            --bg: #f8fafc; 
            --text: #1e293b; 
            --text-muted: #64748b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 16px; 
            max-width: 600px; 
            margin: auto; 
            background: var(--bg); 
            color: var(--text); 
            -webkit-font-smoothing: antialiased;
        }
        .card { 
            background: white; 
            padding: 16px; 
            border-radius: 16px; 
            box-shadow: var(--card-shadow); 
            margin-bottom: 12px; 
            box-sizing: border-box;
        }
        
        /* ログイン・ユーザー情報用スタイル */
        .auth-container { text-align: center; padding: 40px 20px; }
        .user-profile { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; font-size: 0.9em; font-weight: 600; }
        .user-profile button { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; font-size: 13px; padding: 4px 8px; border-radius: 6px; }
        .user-profile button:hover { background: #fee2e2; }
        
        /* 総資産表示スタイル */
        .total-assets { text-align: center; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        .total-assets h2 { margin: 0; font-size: 0.9em; opacity: 0.9; font-weight: 500; letter-spacing: 0.05em; }
        .total-assets .amount { font-size: 1.8em; font-weight: 700; margin-top: 4px; display: block; }

        /* カレンダーヘッダー */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .calendar-header h3 { margin: 0; font-size: 1.1em; font-weight: 700; }
        .cal-nav-btn { background: #f1f5f9; color: var(--text); border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85em; transition: all 0.2s; }
        .cal-nav-btn:hover { background: #e2e8f0; }

        /* カレンダーコンパクト化 */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { text-align: center; padding: 6px; font-size: 0.75em; color: var(--text-muted); font-weight: 600; }
        td { height: 52px; border: 1px solid #f1f5f9; text-align: center; vertical-align: top; font-size: 0.85em; cursor: pointer; padding: 2px 1px; box-sizing: border-box; position: relative; }
        td:hover { background: #f1f5f9; border-radius: 4px; }
        .day-num { font-weight: 600; display: block; color: #475569; margin-bottom: 1px; font-size: 0.9em; }
        
        /* カレンダー内の金額表示スタイル */
        .day-price { font-size: 0.65em; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.1; font-weight: 500; transform: scale(0.9); }
        .color-expense { color: var(--danger); } 
        .color-income { color: var(--success); }  

        /* 選択された日付、今日の日付のスタイル */
        td.calendar-td-today { background-color: #eff6ff; border: 2px solid #3b82f6; border-radius: 4px; }
        td.calendar-td-today .day-num { color: #1d4ed8; font-weight: 700; }
        td.calendar-td-selected { background-color: #f0fdf4; border: 2px solid #22c55e; border-radius: 4px; }

        /* ナビゲーションバー */
        nav { display: flex; gap: 8px; margin-bottom: 16px; }
        nav button { flex: 1; padding: 10px 2px; border: none; border-radius: 12px; background: white; color: var(--text-muted); font-weight: 600; cursor: pointer; font-size: 0.9em; box-shadow: var(--card-shadow); transition: all 0.2s; }
        nav button.active { background: var(--primary); color: white; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* 今月の集計のミニマル化 */
        .summary-mini-grid { display: flex; gap: 12px; margin-bottom: 4px; }
        .summary-mini-grid > div { flex: 1; background: #f8fafc; padding: 10px; border-radius: 12px; max-height: 110px; overflow-y: auto; border: 1px solid #f1f5f9; }
        .summary-mini-grid h4 { margin: 0 0 6px 0; font-size: 0.8em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 4px; border-bottom: 1px solid #e2e8f0; }
        .summary-item { font-size: 0.75em; padding: 3px 0; display: flex; justify-content: space-between; align-items: center; color: #334155; }
        .summary-item span:last-child { font-weight: 600; }

        /* シームレス内訳リスト用スタイル */
        .daily-header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .daily-section-title { font-size: 0.95em; font-weight: 700; margin: 0; color: #334155; }
        .btn-add-item { background: var(--primary); color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 0.8em; font-weight: 600; cursor: pointer; box-shadow: 0 2px 4px rgba(92,107,192,0.2); transition: all 0.2s; }
        .btn-add-item:hover { background: var(--primary-hover); }

        /* スクロール可能な明細コンテナ */
        .seamless-scroll-container { max-height: 280px; overflow-y: auto; scroll-behavior: smooth; padding-right: 2px; }
        .day-group-block { padding: 4px 0; margin-bottom: 8px; border-radius: 8px; transition: background-color 0.5s ease; }
        .day-group-block.highlight-target { background-color: #f0fdf4; border-left: 4px solid #22c55e; padding-left: 4px; }
        .day-group-title { font-size: 0.8em; font-weight: 700; color: var(--text-muted); margin: 4px 0 6px 2px; display: flex; justify-content: space-between; }
        
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 12px; margin-bottom: 6px; border: 1px solid #f1f5f9; background: #fff; border-left: 4px solid #cbd5e1; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.02); }
        .history-item.expense { border-left-color: var(--danger); }
        .history-item.income { border-left-color: var(--success); }
        .history-item.transfer { border-left-color: var(--primary); }
        .history-item b { color: #1e293b; font-size: 0.95em; }
        .history-item small { color: var(--text-muted); font-size: 0.8em; }
        .history-actions { display: flex; gap: 6px; }
        .btn-edit { background: #fef3c7; color: #d97706; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75em; font-weight: 600; }
        .btn-del { background: #fee2e2; color: #dc2626; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75em; font-weight: 600; }
        
        input, select { 
            width: 100%; 
            padding: 10px 14px; 
            margin: 6px 0; 
            border: 1px solid #e2e8f0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px;
            background-color: #ffffff;
            color: var(--text);
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(92, 107, 192, 0.15);
        }
        
        button.main-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; font-size: 15px; transition: all 0.2s; }
        button.main-btn:hover { background: var(--primary-hover); }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-bottom: 1px solid #f1f5f9; font-size: 0.9em; }
        .setting-row .balance { font-size: 0.8em; color: var(--text-muted); }

        /* 登録フォーム内のサブタブ */
        .sub-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
        .sub-tabs button { flex: 1; padding: 8px 4px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; color: var(--text-muted); cursor: pointer; font-weight: 600; font-size: 0.85em; transition: all 0.2s; }
        .sub-tabs button.active { background: #e0e7ff; border-color: var(--primary); color: var(--primary); }
        .input-sub-page { display: none; }
        .input-sub-page.active { display: block; }

        /* 全期間履歴用のスクロール領域設定 */
        .scroll-list { max-height: 240px; overflow-y: auto; padding-right: 4px; }

        /* 分析タブ用のテーブル＆リストスタイル */
        .analytics-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        .analytics-table th, .analytics-table td { padding: 8px 6px; border-bottom: 1px solid #f1f5f9; text-align: right; }
        .analytics-table th { text-align: center; background: #f8fafc; font-weight: 600; color: var(--text-muted); }
        .analytics-table td:first-child { text-align: center; font-weight: 600; }
        .analytics-total-row { background-color: #f1f5f9; font-weight: 700; }

        .rank-badge { inline-block; width: 18px; height: 18px; background: #cbd5e1; color: #475569; text-align: center; line-height: 18px; border-radius: 50%; font-size: 0.75em; margin-right: 8px; font-weight: 700; }
        .rank-1 { background: #fef3c7; color: #b45309; }
        .rank-2 { background: #f1f5f9; color: #475569; }
        .rank-3 { background: #ffedd5; color: #c2410c; }
        
        /* ローディング画面 */
        #loading-screen { display: flex; justify-content: center; align-items: center; position: fixed; top:0; left:0; width:100%; height:100%; background: #ffffff; z-index:9999; font-weight:600; color:var(--primary); }
    </style>
</head>
<body>

    <div id="loading-screen">読み込み中...</div>

    <div id="login-page" class="card auth-container" style="display: none;">
        <h2 style="font-size: 1.5em; letter-spacing: -0.025em; margin-bottom: 8px;">📊 R-KAKEIBO</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 24px;">データをクラウドで安全に同期します。</p>
        <button class="main-btn" onclick="loginWithGoogle()">Googleアカウントでログイン</button>
    </div>

    <div id="app-content" style="display: none;">

        <nav>
            <button onclick="show('cal')" id="btn-cal" class="active">ホーム</button>
            <button onclick="show('history-tab')" id="btn-history-tab">履歴</button>
            <button onclick="show('analytics')" id="btn-analytics">📊 分析</button>
            <button onclick="show('settings')" id="btn-settings">設定</button>
        </nav>

        <div id="cal-page" class="page active">
            <div class="card" id="calendar-area" style="padding: 12px; touch-action: pan-y;"></div>

            <div id="inline-input-card" class="card" style="display: none; border: 2px solid var(--primary); background: #fafafa;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h2 id="form-title" style="margin:0; font-size:1em; border-left: 4px solid var(--primary); padding-left: 8px;">項目登録</h2>
                    <button onclick="closeInputForm()" style="background:none; border:none; font-size:1.3em; cursor:pointer; color:#999; padding:0 4px;">&times;</button>
                </div>
                <div class="sub-tabs">
                    <button id="tab-expense" class="active" onclick="switchInputMode('expense')">支出</button>
                    <button id="tab-income" onclick="switchInputMode('income')">収入</button>
                    <button id="tab-transfer" onclick="switchInputMode('transfer')">残高振替</button>
                </div>
                
                <input type="hidden" id="edit-id">
                <input type="date" id="date">
                <input type="number" inputmode="numeric" id="price" placeholder="金額 (円)">
                <input type="text" id="memo" placeholder="メモ">
                
                <div id="form-expense-group" class="input-sub-page active">
                    <select id="cat"></select>
                    <select id="pay"></select>
                </div>

                <div id="form-income-group" class="input-sub-page">
                    <select id="income-cat">
                        <option value="給与">給与</option>
                        <option value="ボーナス">ボーナス</option>
                        <option value="副収入">副収入</option>
                        <option value="その他収入">その他収入</option>
                    </select>
                    <select id="income-pay"></select>
                </div>

                <div id="form-transfer-group" class="input-sub-page">
                    <select id="transfer-from"></select>
                    <select id="transfer-to"></select>
                </div>

                <button class="main-btn" style="margin-top:10px;" onclick="save()">保存</button>
            </div>
            
            <div class="card" style="margin-bottom: 12px;">
                <div class="daily-header-wrap">
                    <h3 class="daily-section-title" id="daily-title">📋 今月の内訳一覧</h3>
                    <button class="btn-add-item" onclick="openFormWithSelectedDate()">＋ 追加</button>
                </div>
                <div class="seamless-scroll-container" id="seamless-history-list">
                    </div>
            </div>

            <div class="card">
                <div class="summary-mini-grid">
                    <div>
                        <h4>今月の支出カテゴリ</h4>
                        <div id="cat-sum"></div>
                    </div>
                    <div>
                        <h4>現在の口座残高</h4>
                        <div id="pay-sum"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="history-tab-page" class="page">
            <div class="card">
                <h3 style="margin-top:0; font-size:1em; color:#334155;">支出履歴（全期間）</h3>
                <div class="scroll-list" id="all-expense-list"></div>
            </div>
            <div class="card">
                <h3 style="margin-top:0; font-size:1em; color:#334155;">収入履歴（全期間）</h3>
                <div class="scroll-list" id="all-income-list"></div>
            </div>
            <div class="card">
                <h3 style="margin-top:0; font-size:1em; color:#334155;">振替履歴（全期間）</h3>
                <div class="scroll-list" id="all-transfer-list"></div>
            </div>
        </div>

        <div id="analytics-page" class="page">
            <div class="total-assets">
                <h2>💰 現在の総資産</h2>
                <span class="amount" id="total-assets-amount">0円</span>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <h3 style="margin:0; font-size:1em; color:#334155;">📅 年間収支レポート</h3>
                    <select id="analytics-year-select" onchange="renderAnalytics()" style="width: auto; padding: 4px 8px; margin: 0; font-size:13px;"></select>
                </div>
                <table class="analytics-table">
                    <thead>
                        <tr><th>月</th><th>収入</th><th>支出</th><th>収支差</th></tr>
                    </thead>
                    <tbody id="analytics-monthly-tbody"></tbody>
                </table>
            </div>

            <div class="card">
                <h3 style="margin-top:0; font-size:1em; color:#334155;">🏆 年間カテゴリ別支出ランキング</h3>
                <div id="analytics-cat-rank"></div>
            </div>
        </div>

        <div id="settings-page" class="page">
            <div class="user-profile">
                <span id="user-display-name">ユーザー名</span>
                <button onclick="logout()">ログアウト</button>
            </div>

            <div class="card">
                <h3 style="margin-top:0; font-size:1em; color:#334155;">カテゴリ管理（支出）</h3>
                <div style="display:flex; gap:6px;">
                    <input type="text" id="new-cat" placeholder="カテゴリ名" style="margin:0;">
                    <button class="main-btn" onclick="addCatSetting()" style="width:70px;">追加</button>
                </div>
                <div id="cat-list" style="margin-top:12px;"></div>
            </div>
            
            <div class="card">
                <h3 style="margin-top:0; font-size:1em; color:#334155;">アカウント管理</h3>
                <input type="text" id="new-pay" placeholder="アカウント名 (例: 現金、銀行)">
                <div style="display:flex; gap:6px; margin-top:4px;">
                    <input type="number" id="new-pay-balance" placeholder="初期残高（円）" value="0" style="margin:0;">
                    <button class="main-btn" onclick="addPaySetting()" style="width:70px;">追加</button>
                </div>
                <div id="pay-list" style="margin-top:12px;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCX0y2SjoFdJXaqxJ3S6su__v701WJJ8yM",
            authDomain: "runaga-kakeibo-app.firebaseapp.com",
            projectId: "runaga-kakeibo-app",
            storageBucket: "runaga-kakeibo-app.firebasestorage.app",
            messagingSenderId: "1045932055793",
            appId: "1:1045932055793:web:ae6dfb0fce61a2a7a91d50"
        };
                
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let kakeiboData = []; 
        let categories = ["食費", "趣味", "日用品", "交通費", "交際費"];
        let accounts = {"現金": 10000, "銀行": 200000};
        let currentDisplayDate = new Date();
        let currentInputMode = 'expense';
        let selectedDateStr = "";

        // 初回起動時・当日日付の初期セット
        const t = new Date();
        selectedDateStr = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;

        window.loginWithGoogle = () => {
            signInWithPopup(auth, provider).catch(err => alert("ログインエラー: " + err.message));
        };

        window.logout = () => {
            signOut(auth).then(() => location.reload());
        };

        onAuthStateChanged(auth, (user) => {
            document.getElementById('loading-screen').style.display = 'none';
            if (user) {
                currentUser = user;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('user-display-name').innerText = user.displayName + " さん";
                syncCloudData();
            } else {
                document.getElementById('login-page').style.display = 'block';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        function syncCloudData() {
            if (!currentUser) return;
            const userDocRef = doc(db, "users", currentUser.uid);

            onSnapshot(userDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const cloudData = docSnap.data();
                    kakeiboData = cloudData.kakeiboData || [];
                    categories = cloudData.categories || ["食費", "趣味", "日用品", "交通費", "交際費"];
                    accounts = cloudData.accounts || {"現金": 10000, "銀行": 200000};
                } else {
                    saveToCloud();
                }
                initUI();
                updateHomeView();
                if (document.getElementById('analytics-page').classList.contains('active')) renderAnalytics();
                if (document.getElementById('history-tab-page').classList.contains('active')) renderAllHistoryLists();
            });
        }

        async function saveToCloud() {
            if (!currentUser) return;
            const userDocRef = doc(db, "users", currentUser.uid);
            await setDoc(userDocRef, { kakeiboData, categories, accounts });
        }

        function initUI() {
            document.getElementById('cat').innerHTML = categories.map(i => `<option value="${i}">${i}</option>`).join('');
            document.getElementById('cat-list').innerHTML = categories.map(i => `
                <div class="setting-row"><span>${i}</span><button class="btn-del" data-cat="${i}">削</button></div>`).join('');

            const accountsHtml = Object.keys(accounts).map(i => `<option value="${i}">${i}</option>`).join('');
            document.getElementById('pay').innerHTML = accountsHtml;
            document.getElementById('income-pay').innerHTML = accountsHtml;
            document.getElementById('transfer-from').innerHTML = accountsHtml;
            document.getElementById('transfer-to').innerHTML = accountsHtml;
            
            document.getElementById('pay-list').innerHTML = Object.keys(accounts).map(i => `
                <div class="setting-row">
                    <div><span>${i}</span> <span class="balance">(${parseInt(accounts[i]).toLocaleString()}円)</span></div>
                    <button class="btn-del" data-pay="${i}">削</button>
                </div>`).join('');

            document.querySelectorAll('#cat-list .btn-del').forEach(btn => {
                btn.onclick = () => delCatSetting(btn.getAttribute('data-cat'));
            });
            document.querySelectorAll('#pay-list .btn-del').forEach(btn => {
                btn.onclick = () => delPaySetting(btn.getAttribute('data-pay'));
            });
        }

        function updateHomeView() {
            renderCalendar();
            renderDashboard();
            renderSeamlessHistory();
        }

        function renderCalendar() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            
            const todayObj = new Date();
            const todayStr = `${todayObj.getFullYear()}-${String(todayObj.getMonth()+1).padStart(2,'0')}-${String(todayObj.getDate()).padStart(2,'0')}`;
            
            const dailyExpenseSum = {};
            const dailyIncomeSum = {};
            
            kakeiboData.forEach(item => {
                if(item.date) {
                    if(item.type === 'expense') {
                        dailyExpenseSum[item.date] = (dailyExpenseSum[item.date] || 0) + parseInt(item.price || 0);
                    } else if(item.type === 'income') {
                        dailyIncomeSum[item.date] = (dailyIncomeSum[item.date] || 0) + parseInt(item.price || 0);
                    }
                }
            });
            
            let html = `
                <div class="calendar-header">
                    <button class="cal-nav-btn" id="cal-prev">◀</button>
                    <h3>${year}年 ${month+1}月</h3>
                    <button class="cal-nav-btn" id="cal-next">▶</button>
                </div>
                <table><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr><tr>`;
                
            for(let i=0; i<firstDay; i++) html += '<td></td>';
            for(let d=1; d<=lastDate; d++) {
                if((firstDay + d - 1) % 7 === 0 && d !== 1) html += '</tr><tr>';
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                let priceHtml = '';
                if(dailyExpenseSum[dateStr]) priceHtml += `<span class="day-price color-expense">-${Math.round(dailyExpenseSum[dateStr]/100)/10}k</span>`;
                if(dailyIncomeSum[dateStr]) priceHtml += `<span class="day-price color-income">+${Math.round(dailyIncomeSum[dateStr]/100)/10}k</span>`;
                
                let cellClass = 'cal-cell';
                if (dateStr === selectedDateStr) {
                    cellClass += ' calendar-td-selected';
                } else if (dateStr === todayStr) {
                    cellClass += ' calendar-td-today';
                }
                
                html += `<td class="${cellClass}" data-date="${dateStr}">
                            <span class="day-num">${d}</span>
                            ${priceHtml}
                         </td>`;
            }
            html += '</tr></table>';
            
            const calArea = document.getElementById('calendar-area');
            calArea.innerHTML = html;

            document.getElementById('cal-prev').onclick = () => changeMonth(-1);
            document.getElementById('cal-next').onclick = () => changeMonth(1);
            document.querySelectorAll('.cal-cell').forEach(cell => {
                cell.onclick = () => handleDateClick(cell.getAttribute('data-date'));
            });

            setupSwipeEvents(calArea, {
                onSwipeLeft: () => changeMonth(1),  
                onSwipeRight: () => changeMonth(-1) 
            }, 'horizontal');
        }

        function changeMonth(offset) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
            updateHomeView();
            closeInputForm();
        }

        // カレンダーの日付タップ時挙動：下部の対応する日付位置まで自動スクロール
        function handleDateClick(dateStr) {
            selectedDateStr = dateStr;
            document.getElementById('date').value = dateStr;
            
            // カレンダー枠線デザインの即時リフレッシュ
            renderCalendar();

            // 下部明細リストの中の該当ターゲットにジャンプ
            const targetBlock = document.getElementById(`day-block-${dateStr}`);
            if (targetBlock) {
                targetBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
                // フワッと光るエフェクトの付与
                targetBlock.classList.add('highlight-target');
                setTimeout(() => {
                    targetBlock.classList.remove('highlight-target');
                }, 1500);
            }
        }

        // 内訳カードの「追加」ボタンが押された時のフォーム起動
        window.openFormWithSelectedDate = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('price').value = '';
            document.getElementById('memo').value = '';
            document.getElementById('date').value = selectedDateStr;
            switchInputMode('expense');
            document.getElementById('inline-input-card').style.display = 'block';
            document.getElementById('inline-input-card').scrollIntoView({ behavior: 'smooth' });
        };

        // 表示月（カレンダー連動）のデータをシームレスに一覧表示する関数
        function renderSeamlessHistory() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const currentMonthPrefix = `${year}-${String(month+1).padStart(2,'0')}`;
            
            const container = document.getElementById('seamless-history-list');
            
            // カレンダー対象月のアイテムのみを抽出し、日付の昇順で並び替え
            const monthItems = kakeiboData
                .filter(i => i.date && i.date.startsWith(currentMonthPrefix))
                .sort((a, b) => a.date.localeCompare(b.date));

            if (monthItems.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px 0; color:var(--text-muted);">今月の登録データはありません</div>`;
                return;
            }

            // 日付ごとにグループ分けしてHTMLを生成
            const grouped = {};
            monthItems.forEach(item => {
                if (!grouped[item.date]) grouped[item.date] = [];
                grouped[item.date].push(item);
            });

            let html = "";
            Object.keys(grouped).forEach(dateStr => {
                const [, m, d] = dateStr.split('-');
                const items = grouped[dateStr];
                
                html += `
                    <div class="day-group-block" id="day-block-${dateStr}">
                        <div class="day-group-title">
                            <span>📅 ${parseInt(m)}月${parseInt(d)}日</span>
                        </div>
                `;

                items.forEach(item => {
                    let detail = "";
                    let typeClass = item.type;
                    if(item.type === 'expense') detail = `${item.cat} (${item.pay})`;
                    if(item.type === 'income') detail = `${item.cat} (${item.pay})`;
                    if(item.type === 'transfer') detail = `${item.from} ➔ ${item.to}`;

                    html += `
                        <div class="history-item ${typeClass}">
                            <div>
                                <span style="font-weight:700;">${parseInt(item.price).toLocaleString()}円</span>
                                <br><small>${detail}${item.memo ? ' - ' + item.memo : ''}</small>
                            </div>
                            <div class="history-actions">
                                <button class="btn-edit" data-id="${item.id}">編</button>
                                <button class="btn-del" data-id="${item.id}">削</button>
                            </div>
                        </div>`;
                });

                html += `</div>`;
            });

            container.innerHTML = html;

            // イベント割り当て
            container.querySelectorAll('.btn-edit').forEach(b => b.onclick = () => editItem(b.getAttribute('data-id')));
            container.querySelectorAll('.btn-del').forEach(b => b.onclick = () => deleteItem(b.getAttribute('data-id')));
        }

        window.closeInputForm = () => {
            document.getElementById('inline-input-card').style.display = 'none';
        };

        window.switchInputMode = (mode) => {
            currentInputMode = mode;
            document.getElementById('tab-expense').classList.toggle('active', mode === 'expense');
            document.getElementById('tab-income').classList.toggle('active', mode === 'income');
            document.getElementById('tab-transfer').classList.toggle('active', mode === 'transfer');
            
            document.getElementById('form-expense-group').classList.toggle('active', mode === 'expense');
            document.getElementById('form-income-group').classList.toggle('active', mode === 'income');
            document.getElementById('form-transfer-group').classList.toggle('active', mode === 'transfer');
            
            const isEdit = document.getElementById('edit-id').value !== '';
            document.getElementById('form-title').innerText = isEdit ? '項目の編集' : (mode==='expense'?'支出の登録':mode==='income'?'収入の登録':'残高振替');
        };

        window.save = async () => {
            const id = document.getElementById('edit-id').value;
            const date = document.getElementById('date').value;
            const price = parseInt(document.getElementById('price').value) || 0;
            const memo = document.getElementById('memo').value;
            
            if(!date || price <= 0) { alert("日付と金額を正しく入力してください"); return; }

            const newItem = { id: id || 'id_' + Date.now(), type: currentInputMode, date, price, memo };

            if(currentInputMode === 'expense') {
                newItem.cat = document.getElementById('cat').value;
                newItem.pay = document.getElementById('pay').value;
            } else if(currentInputMode === 'income') {
                newItem.cat = document.getElementById('income-cat').value;
                newItem.pay = document.getElementById('income-pay').value;
            } else {
                newItem.from = document.getElementById('transfer-from').value;
                newItem.to = document.getElementById('transfer-to').value;
            }

            if(id) {
                kakeiboData = kakeiboData.map(item => item.id === id ? newItem : item);
            } else {
                kakeiboData.push(newItem);
            }

            await saveToCloud();
            closeInputForm();
            updateHomeView();
        };

        async function deleteItem(id) {
            if(!confirm("本当に削除しますか？")) return;
            kakeiboData = kakeiboData.filter(item => item.id !== id);
            await saveToCloud();
            updateHomeView();
        }

        function editItem(id) {
            const item = kakeiboData.find(i => i.id === id);
            if(!item) return;

            document.getElementById('edit-id').value = item.id;
            document.getElementById('date').value = item.date;
            document.getElementById('price').value = item.price;
            document.getElementById('memo').value = item.memo;

            switchInputMode(item.type);

            if(item.type === 'expense') {
                document.getElementById('cat').value = item.cat;
                document.getElementById('pay').value = item.pay;
            } else if(item.type === 'income') {
                document.getElementById('income-cat').value = item.cat;
                document.getElementById('income-pay').value = item.pay;
            } else {
                document.getElementById('transfer-from').value = item.from;
                document.getElementById('transfer-to').value = item.to;
            }

            document.getElementById('inline-input-card').style.display = 'block';
            document.getElementById('inline-input-card').scrollIntoView({ behavior: 'smooth' });
        }

        function setupSwipeEvents(element, callbacks, direction = 'both') {
            let touchStartX = 0;
            let touchStartY = 0;
            let touchEndX = 0;
            let touchEndY = 0;
            const threshold = 50; 

            element.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            element.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleGesture();
            }, { passive: true });

            function handleGesture() {
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;

                if (direction === 'both' || direction === 'horizontal') {
                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > threshold) {
                        if (diffX < 0 && callbacks.onSwipeLeft) callbacks.onSwipeLeft();
                        if (diffX > 0 && callbacks.onSwipeRight) callbacks.onSwipeRight();
                    }
                }
                if (direction === 'both' || direction === 'vertical') {
                    if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > threshold) {
                        if (diffY < 0 && callbacks.onSwipeUp) callbacks.onSwipeUp();
                        if (diffY > 0 && callbacks.onSwipeDown) callbacks.onSwipeDown();
                    }
                }
            }
        }

        function renderDashboard() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const currentMonthStr = `${year}-${String(month+1).padStart(2,'0')}`;

            const currentBalances = { ...accounts };
            const catSums = {};
            categories.forEach(c => catSums[c] = 0);

            kakeiboData.sort((a,b) => a.date.localeCompare(b.date)).forEach(item => {
                const isCurrentMonth = item.date.startsWith(currentMonthStr);
                const price = parseInt(item.price) || 0;

                if(item.type === 'expense') {
                    if(currentBalances[item.pay] !== undefined) currentBalances[item.pay] -= price;
                    if(isCurrentMonth) catSums[item.cat] = (catSums[item.cat] || 0) + price;
                } else if(item.type === 'income') {
                    if(currentBalances[item.pay] !== undefined) currentBalances[item.pay] += price;
                } else if(item.type === 'transfer') {
                    if(currentBalances[item.from] !== undefined) currentBalances[item.from] -= price;
                    if(currentBalances[item.to] !== undefined) currentBalances[item.to] += price;
                }
            });

            const totalAssets = Object.values(currentBalances).reduce((a, b) => a + b, 0);
            document.getElementById('total-assets-amount').innerText = totalAssets.toLocaleString() + "円";

            document.getElementById('cat-sum').innerHTML = Object.keys(catSums).map(k => `
                <div class="summary-item"><span>${k}</span><span>${catSums[k].toLocaleString()}円</span></div>`).join('');

            document.getElementById('pay-sum').innerHTML = Object.keys(currentBalances).map(k => `
                <div class="summary-item"><span>${k}</span><span>${currentBalances[k].toLocaleString()}円</span></div>`).join('');
        }

        window.show = (pageId) => {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(pageId + '-page').classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');
            
            closeInputForm();
            
            if(pageId === 'history-tab') renderAllHistoryLists();
            if(pageId === 'analytics') { buildYearSelect(); renderAnalytics(); }
            if(pageId === 'cal') updateHomeView();
        };

        function renderAllHistoryLists() {
            const expenses = kakeiboData.filter(i => i.type === 'expense').sort((a,b)=>b.date.localeCompare(a.date));
            const incomes = kakeiboData.filter(i => i.type === 'income').sort((a,b)=>b.date.localeCompare(a.date));
            const transfers = kakeiboData.filter(i => i.type === 'transfer').sort((a,b)=>b.date.localeCompare(a.date));

            document.getElementById('all-expense-list').innerHTML = expenses.map(i => `
                <div class="history-item expense"><div><small>${i.date}</small> <b>${i.cat}</b><br><small>${i.pay} ${i.memo?'('+i.memo+')':''}</small></div><span class="color-expense">-${parseInt(i.price).toLocaleString()}円</span></div>`).join('');
            document.getElementById('all-income-list').innerHTML = incomes.map(i => `
                <div class="history-item income"><div><small>${i.date}</small> <b>${i.cat}</b><br><small>${i.pay} ${i.memo?'('+i.memo+')':''}</small></div><span class="color-success">+${parseInt(i.price).toLocaleString()}円</span></div>`).join('');
            document.getElementById('all-transfer-list').innerHTML = transfers.map(i => `
                <div class="history-item transfer"><div><small>${i.date}</small> <b>${i.from} ➔ ${i.to}</b><br><small>${i.memo?i.memo:''}</small></div><span>${parseInt(i.price).toLocaleString()}円</span></div>`).join('');
        }

        function buildYearSelect() {
            const years = new Set([new Date().getFullYear()]);
            kakeiboData.forEach(i => { if(i.date) years.add(parseInt(i.date.split('-')[0])); });
            const sortedYears = Array.from(years).sort((a,b)=>b-a);
            document.getElementById('analytics-year-select').innerHTML = sortedYears.map(y => `<option value="${y}">${y}年</option>`).join('');
        }

        window.renderAnalytics = () => {
            const targetYear = document.getElementById('analytics-year-select').value;
            if(!targetYear) return;

            const monthlyData = Array.from({length: 12}, () => ({ income: 0, expense: 0 }));
            const catRankSum = {};

            kakeiboData.forEach(item => {
                if(!item.date || !item.date.startsWith(targetYear)) return;
                const monthIdx = parseInt(item.date.split('-')[1]) - 1;
                const price = parseInt(item.price) || 0;

                if(item.type === 'expense') {
                    monthlyData[monthIdx].expense += price;
                    catRankSum[item.cat] = (catRankSum[item.cat] || 0) + price;
                } else if(item.type === 'income') {
                    monthlyData[monthIdx].income += price;
                }
            });

            let totalInc = 0, totalExp = 0;
            let tbodyHtml = "";
            for(let m=0; m<12; m++) {
                const diff = monthlyData[m].income - monthlyData[m].expense;
                totalInc += monthlyData[m].income;
                totalExp += monthlyData[m].expense;
                const diffColor = diff >= 0 ? 'var(--success)' : 'var(--danger)';
                tbodyHtml += `<tr>
                    <td>${m+1}月</td>
                    <td>${monthlyData[m].income.toLocaleString()}円</td>
                    <td class="color-expense">${monthlyData[m].expense.toLocaleString()}円</td>
                    <td style="color:${diffColor}; font-weight:bold;">${diff.toLocaleString()}円</td>
                </tr>`;
            }
            const totalDiff = totalInc - totalExp;
            const totalDiffColor = totalDiff >= 0 ? 'var(--success)' : 'var(--danger)';
            tbodyHtml += `<tr class="analytics-total-row">
                <td>合計</td>
                <td>${totalInc.toLocaleString()}円</td>
                <td class="color-expense">${totalExp.toLocaleString()}円</td>
                <td style="color:${totalDiffColor}">${totalDiff.toLocaleString()}円</td>
            </tr>`;
            document.getElementById('analytics-monthly-tbody').innerHTML = tbodyHtml;

            const rankedCats = Object.keys(catRankSum).map(k => ({name: k, val: catRankSum[k]})).sort((a,b)=>b.val-a.val);
            document.getElementById('analytics-cat-rank').innerHTML = rankedCats.map((c, idx) => `
                <div class="summary-item">
                    <span><span class="rank-badge rank-${idx+1}">${idx+1}</span>${c.name}</span>
                    <span>${c.val.toLocaleString()}円</span>
                </div>`).join('');
        };

        window.addCatSetting = async () => {
            const name = document.getElementById('new-cat').value.trim();
            if(!name || categories.includes(name)) return;
            categories.push(name);
            document.getElementById('new-cat').value = "";
            await saveToCloud();
            initUI();
        };

        async function delCatSetting(name) {
            if(!confirm(`カテゴリ「${name}」を削除しますか？`)) return;
            categories = categories.filter(c => c !== name);
            await saveToCloud();
            initUI();
        }

        window.addPaySetting = async () => {
            const name = document.getElementById('new-pay').value.trim();
            const bal = parseInt(document.getElementById('new-pay-balance').value) || 0;
            if(!name || accounts[name] !== undefined) return;
            accounts[name] = bal;
            document.getElementById('new-pay').value = "";
            document.getElementById('new-pay-balance').value = "0";
            await saveToCloud();
            initUI();
        };

        async function delPaySetting(name) {
            if(!confirm(`アカウント「${name}」を削除しますか？`)) return;
            delete accounts[name];
            await saveToCloud();
            initUI();
        }
    </script>
</body>
