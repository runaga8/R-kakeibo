<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-KAKEIBO - クラウド同期版</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --income: #10b981;
            --expense: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 440px;
            padding: 32px 24px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-align: center;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 32px;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        #login-section {
            text-align: center;
            padding: 24px 8px;
        }

        #login-section p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-google {
            background-color: #ffffff;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        .btn-google:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        #app-section {
            display: none;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 12px 16px;
            background-color: var(--bg-color);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-logout {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .btn-logout:hover {
            color: var(--expense);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #ffffff;
            color: var(--text-main);
            transition: all 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button.btn-submit {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        button.btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .summary {
            display: flex;
            gap: 12px;
            margin: 24px 0;
        }

        .summary>div {
            flex: 1;
            background-color: var(--bg-color);
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .summary span {
            display: block;
            font-size: 18px;
            font-weight: 700;
            margin-top: 4px;
        }

        #total-income {
            color: var(--income);
        }

        #total-expense {
            color: var(--expense);
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 240px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            background-color: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: scale(1.01);
        }

        .history-item.income {
            border-left: 4px solid var(--income);
        }

        .history-item.expense {
            border-left: 4px solid var(--expense);
        }
    </style>
</head>

<body>

    <div class="container">

        <div id="login-section">
            <h1>📊 R-KAKEIBO</h1>
            <p>データをクラウドで安全に同期します。</p>
            <button id="btn-google-login" class="btn-google">
                Googleアカウントでログイン
            </button>
        </div>

        <div id="app-section">
            <div class="user-info">
                <span id="user-display-name">ユーザーさん</span>
                <button id="btn-logout" class="btn-logout">ログアウト</button>
            </div>

            <h2>収支入力</h2>
            <form id="finance-form">
                <div class="form-group">
                    <label for="type">区分</label>
                    <select id="type" required>
                        <option value="expense">支出</option>
                        <option value="income">収入</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">カテゴリ</label>
                    <select id="category" required>
                        <option value="食費">食費</option>
                        <option value="日用品">日用品</option>
                        <option value="交際費">交際費</option>
                        <option value="交通費">交通費</option>
                        <option value="給与">給与</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">金額 (円)</label>
                    <input type="number" id="amount" placeholder="金額を入力" required min="1">
                </div>
                <button type="submit" class="btn-submit">登録する</button>
            </form>

            <div class="summary">
                <div>収入合計: <span id="total-income">0</span>円</div>
                <div>支出合計: <span id="total-expense">0</span>円</div>
            </div>

            <h2>履歴</h2>
            <ul id="history-list" class="history-list">
            </ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ⚙️ ⚠️【重要】ここをご自身のFirebaseの設定にそっくり書き換えてください！
        const firebaseConfig = {
            apiKey: "AIzaSyCX0y2SjoFdJXaqxJ3S6su__v701WJJ8yM",
            authDomain: "runaga-kakeibo-app.firebaseapp.com",
            projectId: "runaga-kakeibo-app",
            storageBucket: "runaga-kakeibo-app.firebasestorage.app",
            messagingSenderId: "1045932055793",
            appId: "1:1045932055793:web:ae6dfb0fce61a2a7a91d50"


        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const loginSection = document.getElementById('login-section');
        const appSection = document.getElementById('app-section');
        const btnGoogleLogin = document.getElementById('btn-google-login');
        const btnLogout = document.getElementById('btn-logout');
        const userDisplayName = document.getElementById('user-display-name');
        const financeForm = document.getElementById('finance-form');
        const historyList = document.getElementById('history-list');

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userDisplayName.textContent = `${user.displayName} さん`;
                loginSection.style.display = 'none';
                appSection.style.display = 'block';
                loadFinanceData(user.uid);
            } else {
                currentUser = null;
                loginSection.style.display = 'block';
                appSection.style.display = 'none';
            }
        });

        btnGoogleLogin.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch((error) => {
                alert(`ログインエラー: ${error.message}`);
            });
        });

        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        financeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            const amount = parseInt(document.getElementById('amount').value);
            const userRecordsRef = ref(db, `users/${currentUser.uid}/records`);

            push(userRecordsRef, {
                type: type,
                category: category,
                amount: amount,
                date: new Date().toISOString()
            }).then(() => {
                financeForm.reset();
            });
        });

        function loadFinanceData(uid) {
            const userRecordsRef = ref(db, `users/${uid}/records`);
            onValue(userRecordsRef, (snapshot) => {
                historyList.innerHTML = '';
                let totalIncome = 0;
                let totalExpense = 0;
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach((key) => {
                        const item = data[key];
                        if (item.type === 'income') {
                            totalIncome += item.amount;
                        } else {
                            totalExpense += item.amount;
                        }
                        const li = document.createElement('li');
                        li.className = `history-item ${item.type}`;
                        const prefix = item.type === 'income' ? '＋' : 'ー';
                        li.textContent = `${item.category}: ${prefix}${item.amount}円`;
                        historyList.appendChild(li);
                    });
                }
                document.getElementById('total-income').textContent = totalIncome.toLocaleString();
                document.getElementById('total-expense').textContent = totalExpense.toLocaleString();
            });
        }
    </script>
</body>

</html>
